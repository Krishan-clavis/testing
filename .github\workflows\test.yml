name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |

            cd /home/ec2-user/testing

            git fetch origin

            git reset --hard origin/main

            docker stop testing || true

            docker rm testing || true

            docker rmi testing:latest || true

            docker build -t testing:latest .

            docker run -d \
            --restart always \
            --name testing \
            -p 3001:3005 \
            testing:latest
