name: Deploy to Amazon Linux EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Amazon Linux EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            set -e

            cd /home/ec2-user/testing

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Installing dependencies..."
            npm install --production

            export PATH=$PATH:/usr/local/bin

            echo "Restarting application..."

            pm2 restart /home/ec2-user/testing || pm2 start server.js --name /home/ec2-user/testing

            pm2 save

            echo "Deployment completed successfully"

            name: Deploy Node App


           git pull origin main

            docker stop testing-my-node-app || true
            docker rm testing-my-node-app || true

            docker build -t testing-my-node-app:latest .

            docker run -d \
              --name testing-my-node-app \
              --restart always \
              -p 3005:3005 \
              testing-my-node-app:latest
            
           
